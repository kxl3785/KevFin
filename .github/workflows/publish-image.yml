name: Publish container image

# Builds a multi-arch (amd64 + arm64) image and pushes it to the GitHub Container
# Registry so a Synology NAS (or anything else) can run KevFin by *pulling* a
# pre-built image instead of compiling from source on the box.
#
# Additive — this does NOT touch the GitOps NAS pipeline. The owner's Portainer
# stack still tracks the `production` branch and builds with `build: .` on the
# NAS; this workflow just publishes ghcr.io/<owner>/kevfin for everyone else.
#
# Runs on every v* release tag (same trigger as desktop-build.yml) so the image
# version tracks the desktop installers, plus manual dispatch for one-offs.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      # QEMU lets the amd64 runner cross-build the arm64 variant (for the rare
      # ARM Synology units). better-sqlite3 compiles per-arch inside each build.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # github.repository_owner is already lowercase; GHCR requires that.
          images: ghcr.io/${{ github.repository_owner }}/kevfin
          # On a v* tag: version + major.minor, plus `latest` (default flavor
          # latest=auto tags the newest non-prerelease semver). On manual dispatch
          # (no tag) there's no semver, so tag `latest` explicitly to have a target.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type != 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
