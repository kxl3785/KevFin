name: iOS Build

# Compiles the SwiftUI app on a macOS runner so the iOS target is verified in CI
# (this repo's main app is built elsewhere; this job only covers ios/).
on:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app for iOS Simulator
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project KevFin.xcodeproj \
            -scheme KevFin \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

  test:
    name: Unit Tests (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run unit tests
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project KevFin.xcodeproj \
            -scheme KevFin \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            test
