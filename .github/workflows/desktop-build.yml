name: Desktop build

# Builds the unsigned standalone desktop apps (macOS .dmg + Windows .exe).
# Run manually from the Actions tab, or automatically when a v* tag is pushed.
# Building the Windows app needs a Windows runner (native better-sqlite3), which
# is why this lives in CI rather than a local cross-build.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Needed so the tag build can attach installers to the GitHub Release.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: KevFin-macos
            files: |
              desktop/dist-app/*.dmg
          # Pin windows-2022: its Visual Studio 2022 is what node-gyp can detect
          # to compile better-sqlite3 (windows-latest ships a newer VS that
          # node-gyp can't parse).
          - os: windows-2022
            artifact: KevFin-windows
            files: |
              desktop/dist-app/*.exe
    defaults:
      run:
        shell: bash
    env:
      # Never attempt code signing — these are intentionally unsigned builds.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          # --ignore-scripts on server skips building better-sqlite3 here — tsc
          # only needs its types; the native module is built later in the stage
          # step (for Electron's ABI). desktop keeps scripts (electron postinstall).
          npm ci --prefix server --ignore-scripts
          npm ci --prefix client
          npm ci --prefix desktop

      - name: Build, stage, and package
        run: npm run desktop:dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

      # On a v* tag, also attach the raw installer to that tag's GitHub Release so
      # it's a public download on the Release page (artifacts above are auth-gated
      # and expire). Skipped for manual workflow_dispatch runs (no tag/release).
      - name: Attach installer to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.files }}
