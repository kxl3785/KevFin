appId: com.kevinliu.kevfin
productName: KevFin
copyright: KevFin

directories:
  output: dist-app
  buildResources: build

# Only the Electron wrapper goes in the app bundle; the server + client ride
# along as extraResources (see desktop/scripts/stage.js).
files:
  - main.js
  - preload.js
  - package.json

# We ship a fully-staged server (incl. node_modules with the Electron-rebuilt
# better-sqlite3) — disable electron-builder's own native handling. node_modules
# is stripped from extraResources (hardcoded), so afterPack copies it in.
npmRebuild: false
nodeGypRebuild: false
afterPack: scripts/afterPack.js

extraResources:
  - from: staging/server
    to: server
  - from: staging/client
    to: client

# Unsigned/un-notarized (no Apple Developer cert). identity:null skips real
# signing; scripts/afterPack.js then ad-hoc signs the bundle so Apple Silicon
# doesn't reject it as "damaged". Windows stays unsigned (SmartScreen warning).
mac:
  target: dmg
  category: public.app-category.finance
  identity: null

dmg:
  writeUpdateInfo: false

win:
  target: nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
