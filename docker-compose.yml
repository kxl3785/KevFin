services:
  kevfin:
    build: .
    image: kevfin:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # SQLite DB lives on the host so data survives container rebuilds/restarts.
      # Synology example: /volume1/docker/kevfin/data:/app/data
      # Override with KEVFIN_DATA_DIR env var or edit the left-hand path directly.
      - ${KEVFIN_DATA_DIR:-./data}:/app/data
    env_file:
      - kevfin.env
    environment:
      - NODE_ENV=production
      # Storage locations inside the container. Default under /app/data (the mounted
      # volume above) so the database and any keys saved in the app persist across
      # rebuilds. Override to relocate either independently.
      - DB_PATH=${DB_PATH:-/app/data/kevfin.db}
      - KEVFIN_ENV_PATH=${KEVFIN_ENV_PATH:-/app/data/kevfin.env}
